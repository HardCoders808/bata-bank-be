name: Bata Bank CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  #######################################################################################################################
  # JOB 1: Compile and Test (Runs on every PR and Push)
  #######################################################################################################################
  verify:
    name: Compile and Verify
    runs-on: bata-bank-runner-set
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven (Compile & Check)
        run: ./mvnw clean compile

      - name: Run Tests
        run: ./mvnw test

  #######################################################################################################################
  # JOB 2: Package and Containerize (Only runs after merge to master)
  #######################################################################################################################
  package:
    name: Build Jar and Docker Image
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: bata-bank-runner-set
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Package JAR
        run: ./mvnw package -DskipTests

      - name: Verify Docker (DinD Check)
        run: docker ps

      - name: Build Docker Image
        run: |
          docker build -t hardcoders808/bata-bank-be:${{ github.sha }} .
          docker tag hardcoders808/bata-bank-be:${{ github.sha }} hardcoders808/bata-bank-be:latest

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bata-bank-backend-jar
          path: target/*.jar