name: Bata Bank CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  #######################################################################################################################
  # JOB 1: Compile and Test (Runs on every PR and Push)
  #######################################################################################################################
  verify:
    name: Compile and Verify
    runs-on: bata-bank-runner-set
    env:
      JWT_PUBLIC_KEY_PEM: ${{ secrets.JWT_PUBLIC_KEY_PEM }}
      JWT_PRIVATE_KEY_PEM: ${{ secrets.JWT_PRIVATE_KEY_PEM }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fix Workspace Permissions
        run: sudo chown -R $USER:$USER .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # Switched to gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle (Compile Check)
        run: ./gradlew classes

      - name: Run Tests
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_PUBLIC_KEY_PEM: ${{ secrets.JWT_PUBLIC_KEY_PEM }}
          JWT_PRIVATE_KEY_PEM: ${{ secrets.JWT_PRIVATE_KEY_PEM }}
        run: ./gradlew test

  #######################################################################################################################
  # JOB 2: Package and Containerize (Only runs after merge to master)
  #######################################################################################################################
  package:
    name: Build Jar and Docker Image
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: bata-bank-runner-set
    env:
      JWT_PUBLIC_KEY_PEM: ${{ secrets.JWT_PUBLIC_KEY_PEM }}
      JWT_PRIVATE_KEY_PEM: ${{ secrets.JWT_PRIVATE_KEY_PEM }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fix Workspace Permissions
        run: sudo chown -R $USER:$USER .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Package JAR
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_PUBLIC_KEY_PEM: ${{ secrets.JWT_PUBLIC_KEY_PEM }}
          JWT_PRIVATE_KEY_PEM: ${{ secrets.JWT_PRIVATE_KEY_PEM }}
        run: ./gradlew bootJar -x test

      - name: Verify Docker (DinD Check)
        run: docker ps

      - name: Build Docker Image
        run: |
          docker build -t hardcoders808/bata-bank-be:${{ github.sha }} .
          docker tag hardcoders808/bata-bank-be:${{ github.sha }} hardcoders808/bata-bank-be:latest

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bata-bank-backend-jar
          path: build/libs/*.jar