server:
  port: 16290
  servlet:
    context-path: /api/v1

spring:
  application:
    name: bata-bank-be
  security:
    user:
      name: admin
      password: admin
  profiles:
    active: dev
  config:
    import:
      - endpoint.yaml
      - optional:file:.env[.properties]

  datasource:
    url: ""
    username: ""
    password: ""
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration


security:
  crypto:
    mfa-key-base64: ${MFA_SECRET_KEY_BASE64}
  jwt:
    public-key-pem: ${JWT_PUBLIC_KEY_PEM:}
    private-key-pem: ${JWT_PRIVATE_KEY_PEM:}