server:
  port: 16290
  servlet:
    context-path: /v1

spring:
  application:
    name: bata-bank-be
  security:
    user:
      name: admin
      password: admin
  profiles:
    active: dev
  config:
    import:
      - endpoint.yaml

  datasource:
    url: ""
    username: ""
    password: ""
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration